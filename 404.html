<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fooseroo</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <script>
    // GitHub Pages has no server-side router. With the app installed and its App
    // Links verified, Android opens these fooseroo.app URLs directly in the app and
    // this page is never reached. Otherwise (no app / iOS / desktop) we forward the
    // ORIGINAL link to the landing page (the tiles), so the visitor can choose the
    // Play Store OR the web version — and the web tile carries this link through and
    // processes it. The landing decodes ?go= into the matching in-app view.
    (function () {
      var p = location.pathname + location.search;
      location.replace('/?go=' + encodeURIComponent(p));
    })();
  </script>
</head>
<body></body>
</html>
