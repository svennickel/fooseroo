<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fooseroo – Tischfußball-Liga-Begleiter, Zähler &amp; Timer</title>
  <meta name="description" content="Fooseroo ist dein Tischfußball-Begleiter: Verfolge die Ligen der deutschen Verbände mit persönlichem Feed, allen Tabellen, Begegnungen und Mannschaften samt Live-Benachrichtigung – und pfeife, archiviere und trainiere deine eigenen Spiele gleich mit.">
  <!-- Common names for table football across regions and languages. -->
  <meta name="keywords" content="Tischfußball, Tischkicker, Kicker, Kickern, Wuzzeln, Wuzzler, Töggele, Töggelen, Töggelichaschte, Krökeln, Kräkeln, Foosball, Table Soccer, Table Football, Babyfoot, Calcio Balilla, Biliardino, Futbolín, Matraquilhos, ITSF, Foosball Counter, Tischfußball-Zähler, Spielstand, Timer, Statistik, Liga">
  <link rel="icon" type="image/png" href="icon.png">
  <meta property="og:title" content="Fooseroo – Tischfußball-Liga-Begleiter, Zähler &amp; Timer">
  <meta property="og:description" content="Die Ligen der deutschen Verbände mit persönlichem Feed, Tabellen, Begegnungen und Live-Benachrichtigung verfolgen – plus Spiele pfeifen und mit ITSF-Timer trainieren.">
  <meta property="og:image" content="https://svennickel.github.io/fooseroo/icon.png">
  <meta property="og:type" content="website">
  <style>
    :root {
      --bg: #0e1a12;
      --card: #16271c;
      --accent: #4caf50;
      --accent-soft: #81c784;
      --text: #eef5ef;
      --muted: #a8bfae;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 600px at 50% -100px, #1d3a26, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 32px;
      text-align: center;
    }
    .lang {
      position: fixed;
      top: 14px; right: 14px;
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 3px;
    }
    .lang button {
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 5px 11px;
      border-radius: 999px;
      cursor: pointer;
    }
    .lang button.active { background: var(--accent); color: #08130b; }
    .icon {
      width: 128px; height: 128px;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
    }
    h1 { font-size: 2.4rem; margin-top: 20px; letter-spacing: .5px; }
    .tagline { color: var(--accent-soft); font-size: 1.15rem; margin-top: 6px; font-weight: 600; }
    .desc {
      color: var(--muted);
      max-width: 560px;
      margin-top: 16px;
      line-height: 1.6;
      font-size: 1.02rem;
    }
    .cta-row { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 14px;
      justify-content: center; align-items: center; }
    .badge { display: inline-block; }
    .badge img { height: 72px; display: block; }
    /* Store-style badge that points to the web version (iOS & desktop). */
    .webbadge { display: inline-flex; align-items: center; gap: 11px; height: 54px;
      box-sizing: border-box; padding: 0 18px; background: #000; border: 1px solid #4a4a4a;
      border-radius: 12px; color: #fff; text-decoration: none;
      transition: border-color .15s, transform .15s; }
    .webbadge:hover { border-color: #8a8a8a; transform: translateY(-1px); }
    .wb-icon { width: 26px; height: 26px; flex: 0 0 auto; color: #fff; }
    .wb-text { display: flex; flex-direction: column; line-height: 1.12; text-align: left; }
    .wb-top { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; opacity: .82; }
    .wb-main { font-size: 18px; font-weight: 700; }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      max-width: 760px;
      width: 100%;
      margin-top: 40px;
    }
    .feature {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 18px 16px;
      text-align: left;
    }
    .feature .emoji { font-size: 1.6rem; }
    .feature h3 { font-size: 1rem; margin-top: 8px; }
    .feature p { color: var(--muted); font-size: .9rem; margin-top: 4px; line-height: 1.45; }
    .share-note {
      display: none;
      background: #2c3a1f;
      border: 1px solid var(--accent);
      border-radius: 14px;
      padding: 16px 18px;
      max-width: 560px;
      margin-top: 28px;
      line-height: 1.5;
      font-size: .95rem;
    }
    .share-note.visible { display: block; }
    .share-note a { color: var(--accent-soft); }
    footer {
      margin-top: auto;
      padding-top: 48px;
      color: var(--muted);
      font-size: .82rem;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="lang">
    <button data-lang="de">DE</button>
    <button data-lang="en">EN</button>
  </div>

  <img class="icon" src="icon.png" alt="Fooseroo App-Icon">
  <h1>Fooseroo</h1>
  <p class="tagline" data-i18n="tagline"></p>
  <p class="desc" data-i18n="desc"></p>

  <div id="shareNote" class="share-note" data-i18n="shareNote"></div>

  <div class="cta-row">
    <a class="badge" href="https://play.google.com/store/apps/details?id=de.snickel.fooser">
      <img id="playBadge" alt="Google Play" src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png">
    </a>
    <a class="webbadge" href="/app/" aria-label="Fooseroo Web-App">
      <svg class="wb-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12,3 a5,9 0 0,0 0,18 a5,9 0 0,0 0,-18" fill="none" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      <span class="wb-text">
        <span class="wb-top" data-i18n="webBadgeTop"></span>
        <span class="wb-main" data-i18n="webBadgeMain"></span>
      </span>
    </a>
  </div>

  <div class="features">
    <div class="feature">
      <span class="emoji">📊</span>
      <h3 data-i18n="f1_title"></h3>
      <p data-i18n="f1_text"></p>
    </div>
    <div class="feature">
      <span class="emoji">⚪</span>
      <h3 data-i18n="f2_title"></h3>
      <p data-i18n="f2_text"></p>
    </div>
    <div class="feature">
      <span class="emoji">⏱️</span>
      <h3 data-i18n="f3_title"></h3>
      <p data-i18n="f3_text"></p>
    </div>
  </div>

  <footer>
    © Sven Nickel ·
    <a href="https://play.google.com/store/apps/details?id=de.snickel.fooser" data-i18n="footerLink"></a>
  </footer>

  <script>
    const I18N = {
      de: {
        _title: "Fooseroo – die Tischfußball-App: Liga, Zähler & Timer",
        _badge: "https://play.google.com/intl/de_de/badges/static/images/badges/de_badge_web_generic.png",
        tagline: "Liga, Zähler, Timer & Statistiken für Tischfußball",
        desc: "Fooseroo ist dein Tischfußball-Begleiter: Verfolge die Ligen der deutschen Verbände mit einem persönlichen Feed, dem ganzen Verband-Baum, Tabellen, Begegnungen und Mannschaften samt Live-Benachrichtigung – und pfeife, archiviere und trainiere deine eigenen Spiele gleich mit.",
        shareNote: "🔗 <strong>Geteilter Link:</strong> Dieser Link gehört zu einer in Fooseroo geteilten Liga, Mannschaft oder Begegnung. Öffne ihn auf einem Android-Gerät mit installierter Fooseroo-App – sie zeigt dir die Details direkt an.",
        f1_title: "Liga verfolgen",
        f1_text: "Persönlicher „Für dich“-Feed deiner Lieblingsligen und -teams – live, heute, als Nächstes, zuletzt. Dazu der ganze Verband→Liga-Baum, Tabellen, Begegnungen, Mannschaften und Spieler, eine Live-Benachrichtigung mit Countdown bis zum Anpfiff und Teilen per Link.",
        f2_title: "Spiele zählen",
        f2_text: "Spielstand, Auflagen, Timeouts und Stangen-Countdown – plus Archiv und Teilen als Grafik.",
        f3_title: "Training",
        f3_text: "Zeitmessung und Zeitgefühl nach ITSF (10s/15s), mit Tagesauswertung pro Person.",
        footerLink: "Fooseroo bei Google Play",
        webVersion: "Webversion (Beta)",
        webBadgeTop: "Für iOS & Desktop",
        webBadgeMain: "Web-App öffnen"
      },
      en: {
        _title: "Fooseroo – the table football app: league, counter & timer",
        _badge: "https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png",
        tagline: "League, counter, timer & stats for table football",
        desc: "Fooseroo is your table football companion: follow the leagues of Germany's federations with a personal feed, the whole federation tree, standings, fixtures and teams plus a live notification – and referee, archive and train your own games right alongside.",
        shareNote: "🔗 <strong>Shared link:</strong> This link belongs to a league, team or fixture shared from Fooseroo. Open it on an Android device with the Fooseroo app installed – it shows you the details directly.",
        f1_title: "Follow the league",
        f1_text: "A personal “For you” feed of your favourite leagues and teams – live, today, up next, recent. Plus the whole federation→league tree, standings, fixtures, teams and players, a live notification with a countdown to kickoff, and sharing by link.",
        f2_title: "Score matches",
        f2_text: "Score, serves, timeouts and the rod countdown – plus an archive and sharing as a graphic.",
        f3_title: "Training",
        f3_text: "Time measurement and time feeling by ITSF (10s/15s), with a daily per-player evaluation.",
        footerLink: "Fooseroo on Google Play",
        webVersion: "Web version (beta)",
        webBadgeTop: "For iOS & desktop",
        webBadgeMain: "Open the web app"
      }
    };

    function applyLang(lang) {
      const dict = I18N[lang] || I18N.en;
      document.documentElement.lang = lang;
      document.title = dict._title;
      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        const k = el.getAttribute('data-i18n');
        if (dict[k] != null) el.innerHTML = dict[k];
      });
      const badge = document.getElementById('playBadge');
      if (badge) badge.src = dict._badge;
      document.querySelectorAll('.lang button').forEach(function (b) {
        b.classList.toggle('active', b.dataset.lang === lang);
      });
      try { localStorage.setItem('lang', lang); } catch (e) {}
    }

    let saved = null;
    try { saved = localStorage.getItem('lang'); } catch (e) {}
    const initial = saved || ((navigator.language || 'en').toLowerCase().indexOf('de') === 0 ? 'de' : 'en');
    applyLang(initial);

    document.querySelectorAll('.lang button').forEach(function (b) {
      b.addEventListener('click', function () { applyLang(b.dataset.lang); });
    });

    // Deep links: the app (if installed) opens fooseroo.app links directly. Otherwise
    // the 404 page forwards the original path here as ?go=<path>. We then offer BOTH
    // tiles (Play Store / web app) and route the WEB badge to the matching in-app
    // view, so the original link is carried through and processed by the web version.
    // (Older league links arrive as ?deeplink= / ?spiel=… and just show the hint.)
    (function () {
      const params = new URLSearchParams(location.search);
      const go = params.get('go') || '';
      const isShare = go || ['spiel', 'team', 'liga', 'deeplink'].some(function (k) {
        return params.has(k);
      });
      if (isShare) document.getElementById('shareNote').classList.add('visible');

      // Carry a supported deep link (match / training / group join) into the web app.
      let webHref = '/app/';
      const mt = go.match(/^\/(m|t)\/([0-9A-Za-z]+)/);
      const grp = go.match(/^\/g\/([0-9A-Za-z-]+)/);
      if (mt) webHref = '/app/#/' + mt[1] + '/' + mt[2];
      else if (grp) webHref = '/app/#/g/' + grp[1];
      const wb = document.querySelector('.webbadge');
      if (wb) wb.setAttribute('href', webHref);
    })();
  </script>
</body>
</html>
